name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Find APK
        run: |
          echo "=== Looking for APK files ==="
          find . -type f -name "*.apk" 2>/dev/null || echo "No APK found with find"
          echo "=== Checking build directory ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          echo "=== Checking intermediates ==="
          ls -la app/build/intermediates/apk/ 2>/dev/null || echo "No intermediates/apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-v1.0.0-debug
          path: 'app/build/outputs/**/*.apk'
          if-no-files-found: warn
