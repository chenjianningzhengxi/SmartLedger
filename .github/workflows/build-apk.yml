name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: List Gradle build tasks
        run: ./gradlew tasks --all --no-daemon 2>&1 | grep -E '(assemble|package|bundle)' | head -20

      - name: Build (full)
        run: |
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build.log
          echo "EXIT_CODE=$?"

      - name: Find all build outputs
        run: |
          echo "=== Any .apk/.aab files ==="
          find app/build -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
          echo "=== outputs/ content (recursive) ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "no outputs"
          echo "=== build/ size ==="
          du -sh app/build/ 2>/dev/null

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-debug
          path: |
            app/build/outputs/
            build.log
          if-no-files-found: warn
