name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: List Gradle tasks (app module)
        run: |
          ./gradlew :app:tasks --all --no-daemon 2>&1 | grep -E '(assemble|package|bundle|compile)' | head -40
          echo "=== App plugin ==="
          ./gradlew :app:properties --no-daemon 2>&1 | grep -E 'plugins|android' | head -10

      - name: Clean and rebuild
        run: |
          echo "=== Clean build ==="
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          echo "=== EXIT: $? ==="
          echo "=== outputs/ ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "no outputs"
          echo "=== build size ==="
          du -sh app/build/
          echo "=== APK search ==="
          find app/build -name "*.apk" -type f 2>/dev/null
          find app/build -name "*.aab" -type f 2>/dev/null

      - name: Debug - check Kotlin compilation
        run: |
          ./gradlew :app:compileDebugKotlin --no-daemon 2>&1 | tail -5
          echo "=== DEX intermediates ==="
          find app/build -path "*/dex/*" -type d 2>/dev/null || echo "No dex dir"
          echo "=== Kotlin classes ==="
          find app/build -name "*.class" -type f 2>/dev/null | head -5 || echo "No classes"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-debug
          path: |
            app/build/outputs/
            app/build/**/*.apk
            app/build/**/*.aab
            build.log
          if-no-files-found: warn
