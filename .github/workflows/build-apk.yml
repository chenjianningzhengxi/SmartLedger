name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: List Gradle build tasks
        run: ./gradlew tasks --group build --no-daemon 2>&1 | tail -30

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Find all build outputs
        run: |
          echo "=== Searching entire build directory ==="
          du -sh app/build/
          find app/build -type f -name "*.apk" -o -name "*.aab" -o -name "*.aar" 2>/dev/null
          echo "=== outputs/ tree ==="
          find app/build/outputs -type f 2>/dev/null || echo "no outputs files"
          echo "=== Checking if outputs/apk exists ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "no outputs"

      - name: Upload APK or AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-v1.0.0-debug
          path: |
            app/build/outputs/**/*.apk
            app/build/outputs/**/*.aab
            app/build/**/*.apk
          if-no-files-found: warn
