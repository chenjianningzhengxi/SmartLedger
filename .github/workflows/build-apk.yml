name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace > gradle_output.log 2>&1
          echo "EXIT_CODE=$?"
          tail -100 gradle_output.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: gradle_output.log
