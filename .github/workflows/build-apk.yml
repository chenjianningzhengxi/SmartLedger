name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        id: build
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace > gradle_output.log 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload logs on failure
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "=== Build failed with exit code ${{ steps.build.outputs.exit_code }} ==="
          echo "=== Last 200 lines of build output ==="
          tail -200 gradle_output.log
          echo "=== Full log uploaded as artifact ==="

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            gradle_output.log
            app/build/outputs/
          if-no-files-found: warn
