name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Find APK
        run: |
          echo "=== All .apk files in workspace ==="
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== app/ contents ==="
          find app -name "*.apk" -type f 2>/dev/null || echo "No APK in app/"
          echo "=== build directory (top 3 levels) ==="
          find app/build -maxdepth 3 -type d 2>/dev/null || echo "No build dir"
          echo "=== Listing app/ ==="
          ls -la app/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-v1.0.0-debug
          path: '**/*.apk'
          if-no-files-found: warn
