name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: List all available Android tasks
        run: |
          ./gradlew :app:tasks --all --no-daemon 2>&1 | grep -iE '(apk|aab|package|assemble|bundle|dex)' > tasks.txt
          echo "=== Build tasks available ==="
          cat tasks.txt

      - name: Force clean build with rerun
        run: |
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace --rerun-tasks 2>&1 | tee gradle_output.txt
          echo "GRADLE_EXIT=${PIPESTATUS[0]}"

      - name: Collect all output info
        run: |
          echo "=== Full build tree ===" > output_info.txt
          find app/build -type f 2>/dev/null >> output_info.txt
          echo "=== Size ===" >> output_info.txt
          du -sh app/build/ 2>/dev/null >> output_info.txt
          echo "=== APK/AAB search ===" >> output_info.txt
          find app/build -name "*.apk" -o -name "*.aab" 2>/dev/null >> output_info.txt
          cat output_info.txt

      - name: Upload full build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            gradle_output.txt
            tasks.txt
            output_info.txt
            app/build/
          if-no-files-found: warn
