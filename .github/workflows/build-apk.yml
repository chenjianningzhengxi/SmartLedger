name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Check package task
        run: |
          echo "=== Tasks matching 'package' ==="
          ./gradlew :app:tasks --all --no-daemon 2>&1 | grep -i "package" || echo "NO package tasks!"
          echo "=== Tasks matching 'assemble' ==="
          ./gradlew :app:tasks --all --no-daemon 2>&1 | grep -i "assemble" || echo "NO assemble tasks!"

      - name: Build
        run: |
          ./gradlew clean :app:compileDebugKotlin :app:packageDebug --no-daemon --stacktrace 2>&1 | tail -80

      - name: Find APK
        run: |
          find /home/runner/work -name "*.apk" -type f 2>/dev/null || echo "No APK"
          find /home/runner/work -name "*.aab" -type f 2>/dev/null || echo "No AAB"
          echo "=== outputs ==="
          find app/build/outputs -type f 2>/dev/null | head -20
          echo "=== build size ==="
          du -sh app/build/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            app/build/outputs/
            app/build/**/*.apk
            app/build/**/*.aab
          if-no-files-found: warn
