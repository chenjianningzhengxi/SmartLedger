name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test Gradle wrapper
        run: ./gradlew --version --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Find APK
        run: |
          echo "=== All .apk/.aab files ==="
          find $GITHUB_WORKSPACE \( -name "*.apk" -o -name "*.aab" \) -type f 2>/dev/null || echo "None found"
          echo "=== outputs/ full tree ==="
          find app/build/outputs -type f 2>/dev/null || echo "No outputs files"
          echo "=== build/ top-level dirs ==="
          ls -la app/build/
          echo "=== Checking for package task output ==="
          find app/build -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20 || echo "No APK/AAB in build"

      - name: Package as APK (explicit)
        if: always()
        run: ./gradlew packageDebug --no-daemon 2>&1 | tail -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLedger-v1.0.0-debug
          path: '**/*.apk'
          if-no-files-found: warn
